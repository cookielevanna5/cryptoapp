when:
  branch: main
  event: push

steps:
  dockle:
    image: euryecetelecom/woodpeckerci-dockle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    settings:
      dockerfile: Dockerfile.io

  docker-build:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dry_run: true
      dockerfile: Dockerfile.io
