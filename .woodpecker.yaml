when:
  branch: main
  event: push

steps:
  env:
    image: busybox
    depends_on: []
    commands:
      - env | sort

  lint-dockerfile.io:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint Dockerfile.io

  lint-dockerfile.app:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint Dockerfile.app

  lint-dockerfile.worker:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint Dockerfile.worker

  python:
    image: python:3.15.0a7-slim
    depends_on: []
    commands:
      - echo "=== DEBUG ==="
      - id
      - whoami
      - ls -ld .
      - ls -l | head
      - echo "hello" >>> a.txt
