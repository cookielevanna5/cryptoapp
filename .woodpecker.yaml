when:
  branch: main
  event: push

steps:
  lint-dockerfile.io:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint --ignore DL3003 --ignore DL3018 Dockerfile.io

  lint-dockerfile.app:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint --ignore DL3003 --ignore DL3018 Dockerfile.app

  lint-dockerfile.worker:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint --ignore DL3003 --ignore DL3018 Dockerfile.worker

  build:
    image: ghcr.io/404systems/plugin-buildah
    privileged: true
    settings:
      repo: repo # its the entire image's name :(
      containerfile: Dockerfile.io
      skip_push: true
      # skip_build: true
      tags:
        - latest
      # context: .

