when:
  branch: main
  event: push

steps:
  peckify:
    image: woodpeckercommunity/peckify:latest
    pull: true
    settings:
      write: true
      path: src/
      git_name: Peckify
      git_email: Peckify@peckify.com
      forge_user: ${CI_COMMIT_AUTHOR}
      forge_token:
        from_secret: github-token

  docker-build:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dry_run: true
      dockerfile: Dockerfile.worker
