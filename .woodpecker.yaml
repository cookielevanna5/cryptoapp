when:
  branch: main
  event: push

steps:
  peckify:
    image: woodpeckercommunity/peckify:latest
    pull: true
    settings:
      check: true
      log_level: debug
      path: src/

  docker-build:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dry_run: true
      dockerfile: Dockerfile.worker
