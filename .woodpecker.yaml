when:
  branch: main
  event: push

steps:
  env:
    image: busybox
    depends_on: []
    commands:
      - env | sort

  lint-dockerfile.io:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint Dockerfile.io

  lint-dockerfile.app:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint Dockerfile.app

  lint-dockerfile.worker:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint Dockerfile.worker

  lint-dockerfile.dockle:
    image: hadolint/hadolint:v2.12.1-beta-alpine
    depends_on: []
    commands:
      - hadolint Dockerfile.dockle

  dockle:
    image: goodwithtech/dockle:latest
    depends_on: []
    commands:
      - dockle --exit-code 1 --exit-level warn python:3.11.15-trixie
